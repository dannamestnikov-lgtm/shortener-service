global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "shortener-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["shortener-service:8080"]

  - job_name: "analytics-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8081"]