databaseChangeLog:
  - changeSet:
      id: 004-create-outbox-table
      author: danila
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: aggregate_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: event_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: sent_at
                  type: TIMESTAMP