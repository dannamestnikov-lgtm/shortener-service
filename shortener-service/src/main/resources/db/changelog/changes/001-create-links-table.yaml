databaseChangeLog:
  - changeSet:
      id: 001-create-links-table
      author: danila
      changes:
        - createTable:
            tableName: links
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: short_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: original_url
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: clicks
                  type: BIGINT
                  defaultValueNumeric: 0

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: expires_at
                  type: TIMESTAMP